name: Manual Dry Run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python scripts/run_daily.py --limit 15

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: recommender-output
          path: output/
